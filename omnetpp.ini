[General]
network = uavminedetection.UAVMineDetection
sim-time-limit = 600s
warmup-period  = 10s
repeat         = 3

# =============================================
# حالة الطائرات (مطلوب لـ SimpleEpEnergyStorage)
# =============================================
*.uav[*].hasStatus = true
*.gcs.hasStatus    = true

# =============================================
# التصور المرئي
# =============================================
*.visualizer.*.mobilityVisualizer.displayMovementTrails   = true
*.visualizer.*.mobilityVisualizer.movementTrailLineColor  = "blue"
*.visualizer.*.mobilityVisualizer.movementTrailLineWidth  = 2

# =============================================
# الراديو IEEE 802.11
# =============================================
*.uav[*].wlan[0].typename                               = "Ieee80211Interface"
*.uav[*].wlan[0].radio.typename                        = "Ieee80211ScalarRadio"
*.uav[*].wlan[0].radio.centerFrequency                 = 5.9GHz
*.uav[*].wlan[0].radio.bandwidth                       = 10MHz
*.uav[*].wlan[0].radio.transmitter.power               = 20mW
*.uav[*].wlan[0].radio.receiver.sensitivity            = -90dBm
*.uav[*].wlan[0].radio.receiver.snirThreshold          = 4dB

*.gcs.wlan[0].typename                                 = "Ieee80211Interface"
*.gcs.wlan[0].radio.typename                           = "Ieee80211ScalarRadio"
*.gcs.wlan[0].radio.centerFrequency                    = 5.9GHz
*.gcs.wlan[0].radio.transmitter.power                  = 20mW
*.gcs.wlan[0].radio.receiver.sensitivity               = -90dBm

# =============================================
# بروتوكول التوجيه AODV
# =============================================
*.uav[*].routingApp.typename = "AODV"
*.gcs.routingApp.typename    = "AODV"

# =============================================
# نموذج الحركة Gauss-Markov — منطقة 1000×1000
# =============================================
*.uav[*].mobility.typename              = "GaussMarkovMobility"
*.uav[*].mobility.speed                 = uniform(10mps, 13mps)
*.uav[*].mobility.alpha                 = 0.85
*.uav[*].mobility.margin                = 50m
*.uav[*].mobility.constraintAreaMinX    = 0m
*.uav[*].mobility.constraintAreaMinY    = 0m
*.uav[*].mobility.constraintAreaMinZ    = 50m
*.uav[*].mobility.constraintAreaMaxX    = 1000m
*.uav[*].mobility.constraintAreaMaxY    = 1000m
*.uav[*].mobility.constraintAreaMaxZ    = 120m
*.uav[*].mobility.speedStdDev           = 2mps
*.uav[*].mobility.angleStdDev           = 25deg

# محطة الأرض ثابتة في المنتصف
*.gcs.mobility.typename    = "StationaryMobility"
*.gcs.mobility.initialX    = 500m
*.gcs.mobility.initialY    = 950m
*.gcs.mobility.initialZ    = 0m

# =============================================
# مواضع البداية — 10 طائرات في شبكة 2×5
# المنطقة 1000×1000 → توزيع منتظم
# =============================================
*.uav[0].mobility.initialX  = 100m
*.uav[0].mobility.initialY  = 200m

*.uav[1].mobility.initialX  = 300m
*.uav[1].mobility.initialY  = 200m

*.uav[2].mobility.initialX  = 500m
*.uav[2].mobility.initialY  = 200m

*.uav[3].mobility.initialX  = 700m
*.uav[3].mobility.initialY  = 200m

*.uav[4].mobility.initialX  = 900m
*.uav[4].mobility.initialY  = 200m

*.uav[5].mobility.initialX  = 100m
*.uav[5].mobility.initialY  = 600m

*.uav[6].mobility.initialX  = 300m
*.uav[6].mobility.initialY  = 600m

*.uav[7].mobility.initialX  = 500m
*.uav[7].mobility.initialY  = 600m

*.uav[8].mobility.initialX  = 700m
*.uav[8].mobility.initialY  = 600m

*.uav[9].mobility.initialX  = 900m
*.uav[9].mobility.initialY  = 600m

# =============================================
# نموذج الطاقة
# =============================================
*.uav[*].energyStorage.typename                                          = "SimpleEpEnergyStorage"
*.uav[*].energyStorage.nominalCapacity                                   = 3600J
*.uav[*].energyStorage.initialCapacity                                   = 3600J

*.uav[*].wlan[0].radio.energyConsumer.typename                           = "Ieee80211StateBasedEpEnergyConsumer"
*.uav[*].wlan[0].radio.energyConsumer.offPowerConsumption                = 0mW
*.uav[*].wlan[0].radio.energyConsumer.sleepPowerConsumption              = 1mW
*.uav[*].wlan[0].radio.energyConsumer.receiverIdlePowerConsumption       = 2mW
*.uav[*].wlan[0].radio.energyConsumer.receiverReceivingPowerConsumption  = 10mW
*.uav[*].wlan[0].radio.energyConsumer.transmitterIdlePowerConsumption    = 2mW
*.uav[*].wlan[0].radio.energyConsumer.transmitterTransmittingPowerConsumption = 100mW

# =============================================
# تطبيق الكشف بالحساس المغناطيسي
# =============================================
*.numUAVs = 10
*.uav[*].numApps = 2

*.uav[*].app[0].typename              = "MineDetectionApp"
*.uav[*].app[0].uavId                 = index()

# ── معاملات الحساس المغناطيسي ──────────────
# الخلفية الطبيعية ≈ 220 nT
# عند d=10م من لغم: 50000/101 ≈ 495 → مع الخلفية ≈ 715 nT > عتبة 500
# عند d=15م من لغم: 50000/226 ≈ 221 → مع الخلفية ≈ 441 nT < عتبة 500
*.uav[*].app[0].magneticThreshold     = 500      # العتبة (nT)
*.uav[*].app[0].magneticSaturation    = 2000     # تشبع الحساس (nT)
*.uav[*].app[0].confirmRadius         = 12m      # نطاق تأكيد وجود لغم
*.uav[*].app[0].falseAlarmProb        = 0.003    # احتمال ضوضاء قوية
*.uav[*].app[0].scanInterval          = 0.5s
*.uav[*].app[0].destPort              = 5555
*.uav[*].app[0].localPort             = 4000

# ── معاملات MineField ──────────────────────
*.mineField.magneticConstant  = 50000   # ثابت المجال (nT·m²)
*.mineField.backgroundNoise   = 220     # ضوضاء الخلفية (nT)
*.mineField.noiseVariation    = 50      # تذبذب الضوضاء ± (nT)

# Heartbeat للشبكة
*.uav[*].app[1].typename       = "UdpBasicApp"
*.uav[*].app[1].destAddresses  = "gcs"
*.uav[*].app[1].destPort       = 5556
*.uav[*].app[1].messageLength  = 64B
*.uav[*].app[1].sendInterval   = exponential(5s)
*.uav[*].app[1].startTime      = uniform(0s, 2s)

# GCS يستقبل على منفذين
*.gcs.numApps         = 2
*.gcs.app[0].typename = "UdpSink"
*.gcs.app[0].localPort = 5555
*.gcs.app[1].typename = "UdpSink"
*.gcs.app[1].localPort = 5556

# =============================================
# تسجيل الإحصاءات
# =============================================
**.scalar-recording = true
**.vector-recording = true
