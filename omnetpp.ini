[General]
network = uavminedetection.UAVMineDetection
# البيئة: أرض زراعية 1كم×1كم | 24 لغم + 50 قطعة معدنية
sim-time-limit = 600s
warmup-period  = 30s
repeat         = 1

# =============================================
# حالة الطائرات (مطلوب لـ SimpleEpEnergyStorage)
# =============================================
*.uav[*].hasStatus = true
*.gcs.hasStatus    = true

# =============================================
# التصور المرئي ثلاثي الأبعاد (OSG 3D)
# =============================================
*.visualizer.typename = "IntegratedOsgVisualizer"

*.visualizer.mobilityVisualizer.displayMovementTrails   = true
*.visualizer.mobilityVisualizer.movementTrailLineColor  = "blue"
*.visualizer.mobilityVisualizer.movementTrailLineWidth  = 2
*.visualizer.mobilityVisualizer.displayVelocities       = true
*.visualizer.mobilityVisualizer.displayOrientations     = true

*.visualizer.dataLinkVisualizer.displayLinks            = true
*.visualizer.dataLinkVisualizer.lineColor               = "green"

*.visualizer.mediumVisualizer.displaySignals            = true

# =============================================
# الراديو IEEE 802.11
# =============================================
*.uav[*].wlan[0].typename                               = "Ieee80211Interface"
*.uav[*].wlan[0].radio.typename                        = "Ieee80211ScalarRadio"
*.uav[*].wlan[0].radio.centerFrequency                 = 5.9GHz
*.uav[*].wlan[0].radio.bandwidth                       = 10MHz
*.uav[*].wlan[0].radio.transmitter.power               = 100mW
*.uav[*].wlan[0].radio.receiver.sensitivity            = -95dBm
*.uav[*].wlan[0].radio.receiver.snirThreshold          = 4dB

*.gcs.wlan[0].typename                                 = "Ieee80211Interface"
*.gcs.wlan[0].radio.typename                           = "Ieee80211ScalarRadio"
*.gcs.wlan[0].radio.centerFrequency                    = 5.9GHz
*.gcs.wlan[0].radio.bandwidth                          = 10MHz
*.gcs.wlan[0].radio.transmitter.power                  = 100mW
*.gcs.wlan[0].radio.receiver.sensitivity               = -95dBm
*.gcs.wlan[0].radio.receiver.snirThreshold             = 4dB

# =============================================
# نموذج الحركة Lawnmower
# =============================================
*.uav[*].mobility.typename              = "LawnmowerMobility"
*.uav[*].mobility.speed                 = 20mps
*.uav[*].mobility.rowCount              = 10
*.uav[*].mobility.y1                    = 0m
*.uav[*].mobility.y2                    = 1000m
*.uav[*].mobility.altitude              = 80m
*.uav[*].mobility.constraintAreaMinX    = 0m
*.uav[*].mobility.constraintAreaMinY    = 0m
*.uav[*].mobility.constraintAreaMaxX    = 1000m
*.uav[*].mobility.constraintAreaMaxY    = 1000m

*.gcs.mobility.typename    = "StationaryMobility"
*.gcs.mobility.initialX    = 500m
*.gcs.mobility.initialY    = 950m
*.gcs.mobility.initialZ    = 0m

# =============================================
# تقسيم المنطقة إلى 10 شرائط عرض 100م
# =============================================
*.uav[0].mobility.x1  = 0m
*.uav[0].mobility.x2  = 100m

*.uav[1].mobility.x1  = 100m
*.uav[1].mobility.x2  = 200m

*.uav[2].mobility.x1  = 200m
*.uav[2].mobility.x2  = 300m

*.uav[3].mobility.x1  = 300m
*.uav[3].mobility.x2  = 400m

*.uav[4].mobility.x1  = 400m
*.uav[4].mobility.x2  = 500m

*.uav[5].mobility.x1  = 500m
*.uav[5].mobility.x2  = 600m

*.uav[6].mobility.x1  = 600m
*.uav[6].mobility.x2  = 700m

*.uav[7].mobility.x1  = 700m
*.uav[7].mobility.x2  = 800m

*.uav[8].mobility.x1  = 800m
*.uav[8].mobility.x2  = 900m

*.uav[9].mobility.x1  = 900m
*.uav[9].mobility.x2  = 1000m

# =============================================
# نموذج الطاقة
# =============================================
*.uav[*].energyStorage.typename                                          = "SimpleEpEnergyStorage"
*.uav[*].energyStorage.nominalCapacity                                   = 3600J
*.uav[*].energyStorage.initialCapacity                                   = 3600J

*.uav[*].wlan[0].radio.energyConsumer.typename                           = "Ieee80211StateBasedEpEnergyConsumer"
*.uav[*].wlan[0].radio.energyConsumer.offPowerConsumption                = 0mW
*.uav[*].wlan[0].radio.energyConsumer.sleepPowerConsumption              = 1mW
*.uav[*].wlan[0].radio.energyConsumer.receiverIdlePowerConsumption       = 2mW
*.uav[*].wlan[0].radio.energyConsumer.receiverReceivingPowerConsumption  = 10mW
*.uav[*].wlan[0].radio.energyConsumer.transmitterIdlePowerConsumption    = 2mW
*.uav[*].wlan[0].radio.energyConsumer.transmitterTransmittingPowerConsumption = 100mW

# =============================================
# تطبيق الكشف — المعاملات الأساسية
# =============================================
*.uav[*].numApps = 1

*.uav[*].app[0].typename              = "MineDetectionApp"
*.uav[*].app[0].uavId                 = ancestorIndex(1)
*.uav[*].app[0].magneticThreshold     = 250
*.uav[*].app[0].magneticSaturation    = 2000
*.uav[*].app[0].confirmRadius         = 20m
*.uav[*].app[0].confirmationTimeout   = 10s
*.uav[*].app[0].falseAlarmProb        = 0.0005
*.uav[*].app[0].falseAlarmDisplayLimit = 30
*.uav[*].app[0].scanInterval          = 0.5s
*.uav[*].app[0].destPort              = 5555
*.uav[*].app[0].localPort             = 5555

# =============================================
# [NEW] معاملات العتبة التكيفية
# =============================================
*.uav[*].app[0].adaptiveWindowSize    = 50
*.uav[*].app[0].adaptiveKSigma        = 3.0
*.uav[*].app[0].adaptiveMinThreshold  = 200

# =============================================
# [NEW] معاملات الضوضاء المترابطة زمنياً — AR(1)
# =============================================
*.uav[*].app[0].sensorNoiseAlpha    = 0.8
*.uav[*].app[0].sensorNoiseScale    = 30.0

# ── معاملات MineField ──────────────────────
*.mineField.magneticConstant  = 800000
*.mineField.backgroundNoise   = 220
*.mineField.noiseVariation    = 5

# [NEW]: معامل التربة (مثال: تربة طينية رطبة = 0.8، أو تربة رملية = 1.0)
*.mineField.soilTypeFactor    = 0.8

# =============================================
# GCS
# =============================================
*.gcs.numApps = 1
*.gcs.app[0].typename   = "uavminedetection.GcsApp"
*.gcs.app[0].localPort  = 5555
*.gcs.app[0].destPort   = 5555

# =============================================
# تسجيل الإحصاءات
# =============================================
**.scalar-recording = true
**.vector-recording = true